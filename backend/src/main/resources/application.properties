spring.application.name=backend
server.port=8081

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/ams_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:ams_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:ams_pwd}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true